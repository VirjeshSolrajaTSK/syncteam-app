name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html styles.css app.js data.js www/

      - name: Install Dependencies & Setup Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "SyncTeam" "com.yourname.syncteam" --web-dir="www"
          npx cap add android
          
          # Fix Jetifier signature collision crash by ignoring BouncyCastle
          echo "android.jetifier.ignorelist=bcprov-jdk18on" >> android/gradle.properties
          
          # Upgrade Gradle wrapper to 8.7 to fix BouncyCastle transformation bug
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.7-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
